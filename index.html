<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto Login</title>
    <link rel="shortcut icon" href="imagens/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <main class="principal">
        <section class="foto">
            <!-- Aqui vai a foto -->
        </section>
        <section class="formulario">
            <h1>Faça o seu login</h1>
            <form action="#" method="post">
                <div class="email">
                    <label for="iemail">Email:</label>
                    <input type="email" name="email" id="iemail" placeholder="Email" minlenght="5" maxlenght="15" required>
                </div>
                <div class="senha">
                    <label for="isenha">Senha:</label>
                    <input type="password" name="senha" id="isenha" required placeholder="Senha">
                </div>
                <div>
                    <input type="button" value="Entrar" class="btn">
                    <a href="#" target="_blank" class="link-externo btn">Esqueci a senha</a>
                </div>
            </form>
        </section>
    </main>
</body>
</html>
