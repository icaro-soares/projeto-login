<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto Login</title>
    <link rel="stylesheet" href="styles/style.css">
    <link rel="shortcut icon" href="assets/favicon.ico" type="image/x-icon">
</head>
<body>
    <main id="principal">
        <section id="imagem">
            <!-- Aqui vai a imagem -->
        </section>
        <section id="dados">
            <h1 id="dados-titulo">Login</h1>
            <p id="dados-texto">Realize o login</p>
            <form action="#" method="post" id="form">
                <p>
                    <label for="iemail">Email:</label>
                    <input type="email" name="email" id="iemail" placeholder="email">
                </p>
                <p>
                    <label for="isenha">Senha:</label>
                    <input type="password" name="senha" id="isenha" placeholder="senha">
                </p>
                <div>
                    <p>
                        <input type="submit" value="Enviar">
                    </p>
                    <p>
                        <input type="reset" value="Esqueci a senha">
                    </p>
                </div>
            </form>
        </section>
    </main>
</body>
</html>
