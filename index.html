<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto Login</title>
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
    
</head>
<body>
    <main>
        <section class="login">
            <div class="imagem">
                <!-- Aqui vai a imagem -->
            </div>
            <div class="dados">
                <h1>Faça seu login</h1>
                <form action="#" method="post" class="formulario">
                    <div class="campo">
                        <span class="material-symbols-outlined">person</span>
                        <label for="iemail">Email:</label>
                        <input type="email" name="email" id="iemail" placeholder="Email" autocomplete="email" required size="22">
                    </div>
                    <div class="campo">
                        <span class="material-symbols-outlined">vpn_key</span>
                        <label for="isenha">Senha:</label>
                        <input type="password" name="senha" id="isenha" placeholder="Senha" autocomplete="off" required minlenght="8" size="21">
                    </div>
                    <div class="botoes">
                        <input type="button" value="Entrar" class="btn">
                        <a href="#">Esqueci a senha</a>
                    </div>
                </form>
            </div>
        </section>
    </main>
</body>
</html>
