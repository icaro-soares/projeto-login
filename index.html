<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="assets/favicon.png" type="image/x-icon">
    <link rel="stylesheet" href="styles/style.css">
    <title>Projeto Login</title>
</head>
<body>
    <main class="principal">
        <h1 class="principal-titulo">Login</h1>
        <p class="principal-texto">Seja bem-vindo(a) novamente. Faça login para acessar sua conta.</p>
        <form class="principal-formulario">
            <section class="principal-formulario-secao">
                <div>
                    <p>
                        <label for="email">
                            <input class="insert" type="email" name="email" id="email" placeholder="Seu email">
                        </label>
                    </p>
                    <p>
                        <label for="senha">
                            <input type="password" name="senha" id="senha" placeholder="Sua senha">
                        </label>
                    </p>
                </div>
                <div>
                    <p>
                        <a href="#">Entrar</a>
                    </p>
                    <p>
                        <a href="#">Esqueci a senha</a>
                    </p>
                </div>
            </section>
        </form>
    </main>
</body>
</html>
