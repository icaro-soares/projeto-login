<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="assets/favicon.png" type="image/x-icon">
    <link rel="stylesheet" href="styles/style.css">
    <title>Projeto Login</title>
</head>
<body>
    <main class="principal">
        <h1 class="principal-titulo">Login</h1>
        <p class="principal-texto">Seja bem-vindo(a) novamente. Faça o login para acessar sua conta e poder fazer as configurações no seu ambiente.</p>
        <form>
            <section>
                <p>
                    <label for="iemail">
                        <input type="email" name="email" id="iemail" placeholder="Seu email">
                    </label>
                </p>
                <p>
                    <label for="isenha">
                        <input type="password" name="senha" id="isenha" placeholde="Sua senha">
                    </label>
                </p>
                <div>
                    <a href="#">Entrar</a>
                    <a href="#">Esqueci a senha</a>
                </div>
            </section>
        </form>
    </main>
</body>
</html>
